<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A local-first academic writing portfolio for essays, reading notes and independent study."
    />
    <meta property="og:title" content="James Newman | Academic Writing Portfolio" />
    <meta
      property="og:description"
      content="A sixth-form academic portfolio built with React, Vite and IBM Carbon Design System."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%BASE_URL%og-image-placeholder.svg" />
    <meta property="og:locale" content="en_GB" />
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&')
            })
            .join('?')

          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash,
          )
        }
      }(window.location))
    </script>
    <script>
      (function () {
        const storageKey = 'academic-portfolio-theme'
        const storedTheme = window.localStorage.getItem(storageKey)
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = storedTheme || (prefersDark ? 'g100' : 'g10')

        document.documentElement.setAttribute('data-carbon-theme', theme)
      })()
    </script>
    <title>James Newman | Academic Writing Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
